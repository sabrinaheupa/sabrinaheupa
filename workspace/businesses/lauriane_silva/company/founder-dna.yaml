origin_story: >-
  Lauriane construiu um escritório de advocacia de sucesso — certificado GPTW,
  equipe de 15 colaboradores, PDI, feedback one-on-one, bons resultados.
  Por fora, tudo certo. Por dentro, vazia. "Me sentia uma presidiária na minha
  própria empresa." Percebia que seus colaboradores também estavam desmotivados,
  fazendo o mínimo — e que sua sociedade estava desalinhada.

  Foi nesse momento que entendeu a importância do alinhamento de expectativas
  em todas as relações — especialmente nas sociedades. Começou inúmeras
  formações para promover mudanças internas no ambiente de trabalho e em si mesma.

  Um dia, em uma reunião, teve a virada: "Ali eu não tinha legado. Eu queria mais.
  Queria promover transformação de vidas." Passou a atender empresários
  sobrecarregados, com dificuldade de sair do operacional para o estratégico,
  que precisavam se permitir viver o extraordinário e se sentir merecedores.

  Evoluiu para a mentoria coletiva in company — transformando o colaborador
  sistemicamente, na vida pessoal e profissional. A descoberta: colaborador mais
  feliz tem alta performance, é mais grato, reduz o turnover e aumenta os
  resultados financeiros. A transformação do empresário se torna a transformação
  do ecossistema inteiro.

core_insight: >-
  Sucesso externo sem transformação interna é uma prisão dourada.
  O próximo nível não vem de mais estratégia — vem de quem você decide ser.

epiphany_moment: >-
  Em uma reunião, percebeu que ali não havia legado. Queria impactar vidas
  e empresas que estavam na mesma situação que ela viveu.
