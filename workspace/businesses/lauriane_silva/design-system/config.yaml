id: lauriane_silva-ds
name: Dra. Lauriane Silva — Design System
source: "onboard-aliado — fase 6"
default_theme: "main"

metadata:
  schema: onboard-aliado.design-system
  version: "1.0"
  status: ACTIVE
  archetype_primary: "Mago"
  archetype_secondary: "Governante"
  mood: "Profundo · Transformador · Premium"
  motion_profile: "bold"
  updated_at: "2026-06-04"

brand_architecture:
  main_brand:
    name: "Dra. Lauriane Silva"
    tagline: "Mentoria & Reprogramação Mental"
    previous_tagline: "Mentoria & Hipnoterapia"
    note: >-
      Tagline atualizada de 'Mentoria & Hipnoterapia' para
      'Mentoria & Reprogramação Mental' — reflete o posicionamento
      atual do Método GMS sem associação clínica de hipnoterapia.
  sub_brand_gms:
    name: "GMS"
    full_name: "Gestão e Mentalidade de Sucesso"
    type: "Mentoria coletiva in company"
    logo_status: "PENDENTE — briefing documentado abaixo"
    logo_brief: >-
      Logotipo tipográfico em serif (mesma família da marca principal:
      Cormorant Garamond). "GMS" em display bold, "Gestão e Mentalidade
      de Sucesso" em small caps espaçado abaixo. Paleta: usa os mesmos
      tokens da marca principal. Hierarquia: sub-marca de Dra. Lauriane
      Silva — pode aparecer "GMS por Dra. Lauriane Silva".

color_tokens:
  primary:
    value: "#5C1A27"
    name: "Red Wine"
    role: "Cor principal — fundos premium, textos de destaque, CTAs"
  accent:
    value: "#C8BFA8"
    name: "Champagne"
    role: "Acento — destaques, selos, elementos de prestígio"
  background:
    value: "#FAFAF8"
    name: "Off-White"
    role: "Fundo primário — temperatura quente, nunca branco puro"
  surface:
    value: "#F2EDE4"
    name: "Cream"
    role: "Cards, seções alternadas, superfícies suaves"
  text:
    value: "#1A1818"
    name: "Quase-preto"
    role: "Texto principal — tom quente, não frio"
  text_muted:
    value: "#857D75"
    name: "Cinza Quente"
    role: "Texto secundário, metadados, subtítulos"
  line:
    value: "#E8E2D9"
    name: "Borda"
    role: "Divisores, bordas sutis"

typography:
  display:
    family: "Cormorant Garamond"
    fallback: "Georgia, 'Times New Roman', serif"
    weight: "400 / 600"
    source: "Google Fonts"
    import_css: "https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500&display=swap"
    usage: "Títulos, headlines, manifesto, display — autoridade clássica"
    note: >-
      Cormorant Garamond é a fonte mais próxima do logo (Didone/transitional
      serif de alto contraste). Para o logo vetorial, verificar com o designer
      a família exata usada no arquivo .ai.
  body:
    family: "Inter"
    fallback: "system-ui, -apple-system, sans-serif"
    weight: "400 / 500"
    source: "Google Fonts"
    usage: "Corpo de texto, UI, botões, labels"

spacing:
  base_unit: 8px
  scale: [4, 8, 16, 24, 32, 48, 64, 96]
  container_max_width: "1200px"

border_radius:
  soft: "6px"
  card: "12px"
  pill: "999px"

components:
  button_primary:
    background: primary
    text: background
    radius: soft
    padding: "14px 32px"
    note: "Fundo vinho, texto off-white — máxima autoridade"
  button_accent:
    background: accent
    text: primary
    radius: soft
    padding: "14px 32px"
    note: "Fundo champagne, texto vinho — prestígio"
  card:
    background: surface
    radius: card
    padding: "34px"
  card_dark:
    background: primary
    radius: card
    padding: "34px"
    note: "Para CTAs finais e momentos de autoridade máxima"
  badge:
    text: accent
    border: accent
    radius: pill
    padding: "6px 14px"

logo_assets:
  location: "/Users/laurianefsilva/Desktop/ Lauriane /Marca Pessoal - e inself /Mentoria e Hipnoterapia/"
  formats_available: [".ai", ".pdf", ".png"]
  variants:
    - "Marca Horizontal (Lauriane F. Silva + MENTORIA & HIPNOTERAPIA)"
    - "Marca Vertical"
    - "Monograma L.F.S (símbolo)"
    - "Selo circular"
    - "InSelf (marca complementar)"
  update_needed:
    - "Tagline: trocar 'Mentoria & Hipnoterapia' → 'Mentoria & Reprogramação Mental'"
    - "Nome: avaliar uso de 'Dra. Lauriane Silva' no lugar de 'Lauriane F. Silva'"
    - "GMS: criar sub-marca (briefing acima)"
  colors_in_files:
    - name: "Red Wine" — primary (cor dominante nos logos)
    - name: "Cream/Champagne" — secondary
    - name: "Black" — versão monocromática
    - name: "Gray" — versão reduzida
    - name: "White" — versão reversa
