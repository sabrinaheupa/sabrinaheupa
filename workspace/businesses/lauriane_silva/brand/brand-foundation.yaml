metadata:
  schema: onboard-aliado.brand-foundation
  slug: lauriane_silva
  status: IN_PROGRESS
  updated_at: "2026-06-03"

positioning:
  enemy: >-
    Mentores que prometem mundos e não entregam nada. Profissionais bons em
    vendas mas fracos em resultado — que nunca investiram no próprio
    desenvolvimento, nunca contratariam o próprio trabalho, mas convencem
    pessoas a comprarem. Mercado cheio de promessa vazia que cansou e
    decepcionou quem realmente queria transformação.

  brand_against:
    - "Promessa sem entrega"
    - "Mentor que nunca foi mentorado"
    - "Venda boa, resultado ruim"
    - "Produto que não transforma, só informa"

  brand_for:
    - "Garantia de resultado ou dinheiro de volta (R$44k — sinal de confiança extrema no método)"
    - "Metodologia própria testada e vivida pela criadora"
    - "Especialização real: reprogramação de mentalidade e fortalecimento de crenças de merecimento"
    - "Credibilidade de quem viveu o problema e construiu a solução"

differentiator_guarantee: >-
  Garantia de resultados ou dinheiro de volta na Mentoria GMS Individual.
  Em uma mentoria de R$44.000, isso é uma declaração de confiança absoluta
  no Método GMS — diferenciação de categoria no mercado de alto ticket.

core_specialization:
  - "Reprogramação de mentalidade"
  - "Fortalecimento de crenças de merecimento"
  - "Metodologia GMS — autoral e exclusiva"

manifesto:
  status: APROVADO
  author: "Lauriane Silva (escrito pela fundadora)"
  text: |
    A empresa era pra ser a sua liberdade.
    Em algum momento, você olhou em volta e percebeu que virou um empresidiário.
    Preso no operacional.
    Refém da própria criação.
    Carregando o que a empresa deveria carregar sozinha.

    Você não está sozinho. E isso não precisa continuar assim.

    Existe uma outra possibilidade — e ela não exige que você trabalhe mais.
    Exige só uma decisão: chega.

    Chega de liderar sozinho o peso de uma empresa que deveria ter outros ombros.
    Chega de ser insubstituível no lugar errado — operando quando deveria estar estratégico.
    Chega de perder o que mais importa apagando incêndios que a sua equipe deveria resolver.

    A mente que te trouxe até aqui não é a mesma que vai te levar para o próximo nível.

    Isso é o que o Método GMS faz.
    Não devolve horas no relógio.
    Devolve tempo de vida.

    Gestão que liberta. Prosperidade que expande. Leveza que você esqueceu que existia.
    Não como recompensa futura —
    como realidade de agora.

    Esse é o trabalho que fazemos juntos.

    Se você se reconheceu aqui, esse é o seu sinal.

core:
  purpose: >-
    Esse negócio existe para transformar vidas através de um método único e
    exclusivo de reprogramação mental e transformação de identidade.
  essence_primary: "Mente que prospera"
  essence_secondary: "Alta performance com leveza"
  essence_note: >-
    Primária = o que o método faz (transformação interna que gera resultado).
    Secundária = como o cliente se sente depois (o estado que ele conquista).
    Uma é o caminho, a outra é o destino.

values:
  - id: honestidade_como_cuidado
    name: "Honestidade como cuidado"
    statement: >-
      Ser honesto com você é a forma mais profunda de te respeitar.
      Digo o que é necessário, porque o seu resultado importa mais
      que a sua aprovação.
    status: APROVADO

  - id: resultado_acima_de_atividade
    name: "Resultado acima de atividade"
    statement: >-
      Não medimos sessões nem horas — medimos transformação real e
      retorno sobre o investimento. ROI é inegociável.
    status: APROVADO

  - id: transformacao_sistemica
    name: "Transformação sistêmica"
    statement: >-
      Não tratamos sintoma, tratamos causa. Mudar o negócio sem
      mudar a mente é construir sobre areia.
    status: APROVADO

  - id: confianca_que_sustenta
    name: "Confiança que sustenta"
    statement: >-
      O processo só funciona em ambiente seguro. Cada encontro é um
      espaço de presença total e sigilo absoluto — sua vulnerabilidade
      é sagrada.
    status: APROVADO

  - id: sigilo_absoluto
    name: "Sigilo absoluto"
    statement: >-
      O que acontece no processo fica no processo. A confidencialidade
      não é protocolo — é respeito à jornada de cada cliente.
    status: APROVADO
beliefs: FILL_LATER
