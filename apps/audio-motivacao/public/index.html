<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Gerador de áudios de Omniterapia · OMNI Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#050505; --dark:#0D0D0D; --panel:#141312; --line:#2a2620;
    --gold:#C8A84B; --gold-light:#E8C86A; --gold-deep:#9A7A2E;
    --cream:#F5F0E8; --muted:#8a8475;
  }
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(1200px 700px at 50% -10%, #1a1710 0%, var(--black) 60%);
    color:var(--cream);font-family:Inter,system-ui,sans-serif;min-height:100vh;
    display:flex;align-items:center;justify-content:center;padding:28px}
  .card{width:100%;max-width:560px;background:linear-gradient(180deg,var(--panel),#0e0d0c);
    border:1px solid var(--line);border-radius:18px;padding:34px 32px;
    box-shadow:0 30px 80px rgba(0,0,0,.6)}
  .kicker{font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:.32em;
    text-transform:uppercase;color:var(--gold);margin:0 0 6px}
  h1{font-family:'DM Serif Display',serif;font-weight:400;font-size:34px;line-height:1.1;margin:0 0 6px}
  .sub{color:var(--muted);font-size:14px;margin:0 0 26px;line-height:1.5}
  label{display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.18em;
    text-transform:uppercase;color:var(--muted);margin:0 0 8px}
  textarea,input{width:100%;background:#0a0908;border:1px solid var(--line);border-radius:11px;
    color:var(--cream);font-family:Inter,sans-serif;font-size:15px;padding:13px 14px;resize:vertical}
  textarea:focus,input:focus{outline:none;border-color:var(--gold-deep)}
  textarea{min-height:84px}
  .field{margin-bottom:20px}
  .durs{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
  .dur{cursor:pointer;border:1px solid var(--line);border-radius:11px;padding:12px 8px;text-align:center;
    background:#0a0908;transition:.15s}
  .dur small{display:block;color:var(--muted);font-size:11px;margin-top:3px;font-family:'IBM Plex Mono',monospace}
  .dur.active{border-color:var(--gold);background:rgba(200,168,75,.08)}
  .dur b{font-size:14px;font-weight:600}
  button.go{width:100%;margin-top:26px;border:none;border-radius:12px;cursor:pointer;
    padding:15px;font-weight:600;font-size:15px;color:#1a1407;
    background:linear-gradient(135deg,#9A7A2E,#C8A84B 45%,#E8C86A 60%,#C8A84B);
    letter-spacing:.02em}
  button.go:disabled{opacity:.5;cursor:not-allowed}
  .row2{display:grid;grid-template-columns:1fr 130px;gap:12px}
  .status{margin-top:24px;display:none}
  .status.show{display:block}
  .bar{height:7px;background:#0a0908;border:1px solid var(--line);border-radius:99px;overflow:hidden;margin-top:10px}
  .bar > i{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--gold-deep),var(--gold-light));
    transition:width .4s}
  .stext{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--muted);letter-spacing:.04em}
  audio{width:100%;margin-top:16px}
  .links{margin-top:12px;font-size:13px}
  .links a{color:var(--gold-light);text-decoration:none;margin-right:16px}
  .err{color:#e0826a;font-size:13px;margin-top:12px;font-family:'IBM Plex Mono',monospace}
  .foot{text-align:center;color:#4f4a40;font-size:11px;margin-top:22px;font-family:'IBM Plex Mono',monospace;letter-spacing:.1em}
  .brand{display:flex;align-items:center;gap:11px;margin:0 0 16px}
  .brand svg{height:22px;width:auto;display:block}
  .brand span{font-family:'IBM Plex Mono',monospace;font-size:13px;letter-spacing:.34em;
    text-transform:uppercase;color:var(--gold);font-weight:500}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <svg viewBox="0 0 566.93 226.77" xmlns="http://www.w3.org/2000/svg" aria-label="OMNI Brasil">
        <path fill="#C8A84B" d="M184.56,137.47l-.62,1.62c-2.61,6.53-5.49,12.52-8.53,18.08,6.74,12.99,16.6,21.73,37.08,21.63,18.33-.11,31.3-19.22,41.3-41.33h-69.22ZM295.54,137.47c-3.22,6.97-6.56,13.61-10.08,19.81,6.67,12.93,14.81,21.8,35.27,21.41,18.37-.36,31.84-19.29,42.27-41.22h-67.45ZM200.59,97.79l-.14.36c-4,10.8-8.1,21.38-12.48,31.47h69.22c4.51-10.97,8.42-22.17,11.95-31.82h-68.56ZM311.65,97.79l-.15.36c-3.97,10.76-8.09,21.38-12.48,31.47h67.58c4.76-10.95,8.85-22.16,12.49-31.82h-67.44ZM203.72,89.93h68.42l.87-2.25c4.11-10.22,8.71-19.14,13.83-26.93-8.4-8.31-21.65-10.3-31.94-10.61-1.78-.06-3.69-.14-5.74-.14-12.63,0-29.93,3.42-45.45,39.93M314.78,89.93h67.33l.87-2.25c4.23-10.5,9.02-19.68,14.27-27.61-8.44-7.75-21.26-9.65-31.26-9.93-1.8-.06-3.72-.14-5.74-.14-12.66,0-29.96,3.42-45.48,39.93M353.01,23.7c20.21.61,36.22,8.42,48.16,23.53.98,1.27,1.91,2.56,2.78,3.89,15.75-18.93,35.48-28.12,59.07-27.41,20.17.61,36.21,8.42,48.12,23.53,11.88,15.09,17.5,34.65,16.8,58.68-.35,11.49-3.03,42.45-24.91,69.03l-.06-.06c-3.79,5.95-10.82,10.01-18.96,10.01-12.17,0-22-8.91-22-19.9,0-6.8,3.78-12.78,9.5-16.38l.1-.07.12-.08c33.17-16.82,42.21-35.86,42.64-45.31,1.83-38.12-20.41-52.49-38.42-53.01-12.71-.39-33.17-2.63-51.2,39.79h22.9v7.86h-26.02l-.14.36c-3.97,10.76-8.08,21.38-12.46,31.47h38.62v7.86h-42.13c-16.71,36.26-37.33,64.08-67.33,65.6-21.26,1.07-42.68-17.69-55.12-33.19-1.15-1.4-1.91-2.96-2.48-4.58-13.96,21.83-30.7,36.67-52.41,37.77-21.26,1.07-42.67-17.69-55.13-33.19-1.13-1.41-1.89-3-2.46-4.63-16.79,25.97-39.1,38.63-66.66,37.83-20.17-.59-36.24-8.44-48.15-23.54-11.89-15.12-17.5-34.67-16.8-58.68.35-11.49,3.04-42.46,24.9-69.03l.06.06c3.8-5.95,10.84-10,18.98-10,12.14,0,22,8.92,22,19.9,0,6.8-3.76,12.77-9.5,16.35l-.1.1-.12.08c-30.08,20.5-41.66,35.23-43.29,44.52-5.66,32.07,21.09,53.26,39.07,53.8,9.4.28,23.03,1.58,36.78-14.9,4.3-6.87,8.7-15.27,12.95-24.26h-18.99v-7.86h22.65c1.62-3.64,3.24-7.29,4.8-10.9,2.72-7.15,5.53-14.15,8.45-20.93h-35.9v-7.86h39.33l.9-2.25c17.54-43.68,44.36-65.05,80-63.98,20.18.61,36.24,8.42,48.15,23.53,1.18,1.49,2.25,3.03,3.32,4.58,15.81-19.4,35.74-28.82,59.6-28.1"/>
      </svg>
      <span>OMNI Brasil</span>
    </div>
    <h1>Gerador de áudios de Omniterapia</h1>
    <p class="sub">Escreva um tema. A IA cria o roteiro e gera o áudio com a voz escolhida.</p>

    <!-- Tela de senha (antes do gerador) -->
    <div id="login">
      <div class="field">
        <label for="senha">Senha de acesso</label>
        <input id="senha" type="password" placeholder="senha" autocomplete="current-password" />
      </div>
      <button class="go" id="entrar">Entrar</button>
      <div class="err" id="loginErr"></div>
    </div>

    <!-- Gerador (liberado após a senha) -->
    <div id="app" hidden>
      <div class="field">
        <label for="tema">Tema do áudio</label>
        <textarea id="tema" placeholder="ex.: confiança e foco para começar a semana; gratidão e abundância; coragem para agir"></textarea>
      </div>

      <div class="field">
        <label>Voz</label>
        <div class="durs" id="vozes"><!-- preenchido via /api/voices --></div>
      </div>

      <div class="field">
        <label>Duração</label>
        <div class="durs" id="durs">
          <div class="dur" data-d="curta"><b>Curta</b><small>~3 min</small></div>
          <div class="dur active" data-d="media"><b>Média</b><small>~6 min</small></div>
          <div class="dur" data-d="completa"><b>Completa</b><small>~10 min</small></div>
        </div>
      </div>

      <button class="go" id="go">Gerar áudio</button>

      <div class="status" id="status">
        <div class="stext" id="stext">Iniciando…</div>
        <div class="bar"><i id="barfill"></i></div>
        <div id="result"></div>
        <div class="err" id="err"></div>
      </div>
    </div>

    <div class="foot">OMNI BRASIL · TRANSFORMAÇÃO QUE SE PROVA</div>
  </div>

<script>
  let duracao = "media";
  const durs = document.getElementById("durs");
  durs.addEventListener("click", e => {
    const el = e.target.closest(".dur"); if(!el) return;
    [...durs.children].forEach(c => c.classList.remove("active"));
    el.classList.add("active"); duracao = el.dataset.d;
  });

  // Seletor de voz — carregado dinamicamente
  let voz = null;
  const vozesBox = document.getElementById("vozes");
  vozesBox.addEventListener("click", e => {
    const el = e.target.closest(".dur"); if(!el) return;
    [...vozesBox.children].forEach(c => c.classList.remove("active"));
    el.classList.add("active"); voz = el.dataset.v;
  });
  fetch("api/voices").then(r => r.json()).then(d => {
    const vs = (d.vozes || []);
    vozesBox.innerHTML = vs.map((v,i) =>
      `<div class="dur${i===0?" active":""}" data-v="${v.id}"><b>${v.rotulo}</b></div>`).join("");
    if(vs[0]) voz = vs[0].id;
  }).catch(()=>{ vozesBox.innerHTML = '<div class="dur active" data-v="rafa"><b>Rafa</b></div>'; voz="rafa"; });

  const go = document.getElementById("go");
  const statusBox = document.getElementById("status");
  const stext = document.getElementById("stext");
  const barfill = document.getElementById("barfill");
  const result = document.getElementById("result");
  const errEl = document.getElementById("err");

  const LABELS = {
    fila: "Na fila…",
    roteiro: "Escrevendo o roteiro…",
    sintetizando: "Gerando o áudio com a voz escolhida…",
  };

  // ===== Autenticação: senha ANTES do gerador =====
  let senha = "";
  const senhaEl = document.getElementById("senha");
  const loginBox = document.getElementById("login");
  const appBox = document.getElementById("app");
  const entrar = document.getElementById("entrar");
  const loginErr = document.getElementById("loginErr");

  function liberar(){ loginBox.hidden = true; appBox.hidden = false; document.getElementById("tema").focus(); }

  async function tentarLogin(s, silencioso){
    try {
      const r = await fetch("api/login", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ senha: s })
      });
      if(r.ok){ senha = s; localStorage.setItem("hip_senha", s); liberar(); return true; }
      if(!silencioso) loginErr.textContent = "Senha incorreta.";
    } catch(e){ if(!silencioso) loginErr.textContent = "Falha de conexão."; }
    return false;
  }

  entrar.addEventListener("click", () => { loginErr.textContent = ""; tentarLogin(senhaEl.value, false); });
  senhaEl.addEventListener("keydown", e => { if(e.key === "Enter"){ e.preventDefault(); entrar.click(); } });

  // auto-login se já houver senha salva neste navegador
  const _salva = localStorage.getItem("hip_senha");
  if(_salva){ senhaEl.value = _salva; tentarLogin(_salva, true); }

  go.addEventListener("click", async () => {
    const tema = document.getElementById("tema").value.trim();
    errEl.textContent = ""; result.innerHTML = "";
    if(!tema){ errEl.textContent = "Escreva um tema."; statusBox.classList.add("show"); return; }

    go.disabled = true; statusBox.classList.add("show");
    stext.textContent = "Iniciando…"; barfill.style.width = "4%";

    let id;
    try {
      const r = await fetch("api/generate", {
        method:"POST", headers:{"Content-Type":"application/json"},
        body: JSON.stringify({ tema, duracao, senha, voz })
      });
      const j = await r.json();
      if(!r.ok){ throw new Error(j.erro || "Falha ao iniciar."); }
      id = j.id;
    } catch(e){ errEl.textContent = e.message; go.disabled = false; return; }

    const poll = setInterval(async () => {
      try {
        const r = await fetch("api/job/" + id);
        const j = await r.json();
        if(j.status === "pronto"){
          clearInterval(poll);
          barfill.style.width = "100%";
          stext.textContent = "Pronto.";
          result.innerHTML =
            '<audio controls src="'+j.audioUrl+'"></audio>' +
            '<div class="links"><a href="'+j.audioUrl+'" download>⬇ Baixar áudio</a>' +
            '<a href="'+j.roteiroUrl+'" target="_blank">📄 Ver roteiro</a></div>';
          go.disabled = false;
          return;
        }
        if(j.status === "erro"){
          clearInterval(poll);
          errEl.textContent = "Erro: " + (j.erro || "desconhecido");
          stext.textContent = "Falhou.";
          go.disabled = false;
          return;
        }
        let pct = 8;
        if(j.status === "sintetizando" && j.progresso && j.progresso.total){
          pct = 30 + Math.round(65 * j.progresso.i / j.progresso.total);
          stext.textContent = LABELS.sintetizando + " (" + j.progresso.i + "/" + j.progresso.total + " trechos)";
        } else {
          if(j.status === "roteiro") pct = 18;
          stext.textContent = LABELS[j.status] || j.status;
        }
        barfill.style.width = pct + "%";
      } catch(e){ /* segue tentando */ }
    }, 1500);
  });
</script>
</body>
</html>
