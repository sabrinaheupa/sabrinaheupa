<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IA Premium — R$ 10.000.000</title>
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --surface2: #1a1a26;
      --border: #2a2a3d;
      --accent: #7c5cfc;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --text-dim: #8888aa;
      --user-bubble: #2d1f6e;
      --ai-bubble: #161624;
      --success: #34d399;
      --radius: 14px;
      --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
      gap: 12px;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: 1.05rem;
      letter-spacing: -0.3px;
    }

    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg, var(--accent), #c084fc);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }

    .logo-sub {
      font-size: 0.68rem;
      color: var(--text-dim);
      font-weight: 400;
      letter-spacing: 0.3px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .badge {
      background: linear-gradient(135deg, #1a0a3d, #2d1f6e);
      border: 1px solid var(--accent);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.72rem;
      color: var(--accent2);
      font-weight: 600;
      white-space: nowrap;
    }

    /* ── Key setup bar ── */
    #key-bar {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-shrink: 0;
    }

    #key-bar label {
      font-size: 0.78rem;
      color: var(--text-dim);
      white-space: nowrap;
    }

    #api-key-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      padding: 6px 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    #api-key-input:focus { border-color: var(--accent); }

    #model-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.78rem;
      padding: 6px 10px;
      outline: none;
      cursor: pointer;
    }

    .key-status {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--border);
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .key-status.ok { background: var(--success); box-shadow: 0 0 6px var(--success); }

    /* ── Messages ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .msg {
      display: flex;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .msg.user { align-self: flex-end; flex-direction: row-reverse; }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg.user .avatar {
      background: linear-gradient(135deg, var(--accent), #c084fc);
    }

    .msg.assistant .avatar {
      background: linear-gradient(135deg, #1a3a5c, #2a5a8c);
    }

    .bubble {
      padding: 14px 18px;
      border-radius: var(--radius);
      line-height: 1.65;
      font-size: 0.93rem;
      max-width: calc(100% - 46px);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(124,92,252,0.3);
      border-bottom-right-radius: 4px;
    }

    .msg.assistant .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* code blocks */
    .bubble code {
      background: rgba(255,255,255,0.07);
      border-radius: 5px;
      padding: 2px 6px;
      font-family: 'Courier New', monospace;
      font-size: 0.85em;
    }

    .bubble pre {
      background: #0d0d18;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .bubble pre code {
      background: transparent;
      padding: 0;
      font-size: 0.85rem;
    }

    /* cursor blink */
    .cursor {
      display: inline-block;
      width: 2px; height: 1em;
      background: var(--accent2);
      border-radius: 1px;
      animation: blink 0.8s infinite;
      vertical-align: text-bottom;
      margin-left: 2px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── Empty state ── */
    #empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      color: var(--text-dim);
      text-align: center;
      padding: 40px 20px;
      user-select: none;
    }

    #empty .big-icon {
      font-size: 3.5rem;
      filter: grayscale(0.3);
    }

    #empty h2 {
      font-size: 1.25rem;
      color: var(--text);
      font-weight: 600;
    }

    #empty p {
      font-size: 0.88rem;
      max-width: 340px;
    }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .suggestion {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 16px;
      font-size: 0.82rem;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--text-dim);
    }

    .suggestion:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(124,92,252,0.08);
    }

    /* ── Input area ── */
    #input-area {
      padding: 16px 24px 20px;
      border-top: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }

    .input-wrap {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 10px 12px;
      transition: border-color 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,92,252,0.12);
    }

    #user-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: var(--font);
      font-size: 0.93rem;
      resize: none;
      max-height: 180px;
      line-height: 1.5;
      padding: 2px 0;
    }

    #user-input::placeholder { color: var(--text-dim); }

    #send-btn {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--accent), #9f75ff);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
      transition: opacity 0.2s, transform 0.1s;
    }

    #send-btn:hover { opacity: 0.85; }
    #send-btn:active { transform: scale(0.94); }
    #send-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    #clear-btn {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-dim);
      font-size: 0.76rem;
      padding: 5px 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    #clear-btn:hover { border-color: #ef4444; color: #ef4444; }

    .input-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 8px;
      padding: 0 2px;
    }

    .hint { font-size: 0.72rem; color: var(--text-dim); }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 90px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #1e1e30;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 0.83rem;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 100;
    }

    #toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    #toast.error { border-color: #ef4444; color: #fca5a5; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    <div>
      <div>IA Premium</div>
      <div class="logo-sub">Powered by Claude</div>
    </div>
  </div>
  <div class="header-right">
    <div class="badge">💎 Valuation: R$ 10.000.000</div>
  </div>
</header>

<div id="key-bar">
  <label>🔑 API Key:</label>
  <input id="api-key-input" type="password" placeholder="sk-ant-..." autocomplete="off" />
  <select id="model-select">
    <option value="claude-opus-4-8">Claude Opus 4.8</option>
    <option value="claude-sonnet-4-6" selected>Claude Sonnet 4.6</option>
    <option value="claude-haiku-4-5">Claude Haiku 4.5</option>
  </select>
  <div class="key-status" id="key-status" title="Sem chave"></div>
</div>

<div id="messages">
  <div id="empty">
    <div class="big-icon">✦</div>
    <h2>Como posso ajudar?</h2>
    <p>Digite uma mensagem ou escolha uma sugestão abaixo.</p>
    <div class="suggestions">
      <div class="suggestion" onclick="suggest('Explique inteligência artificial em 3 frases')">🧠 O que é IA?</div>
      <div class="suggestion" onclick="suggest('Escreva um poema curto sobre o Brasil')">📝 Escreva um poema</div>
      <div class="suggestion" onclick="suggest('Me dê 5 ideias de startups de tecnologia para 2025')">💡 Ideias de startup</div>
      <div class="suggestion" onclick="suggest('Como faço um app React do zero? Passo a passo resumido')">⚛️ App em React</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-wrap">
    <textarea id="user-input" rows="1" placeholder="Envie uma mensagem..." autocomplete="off"></textarea>
    <button id="send-btn" title="Enviar (Enter)">➤</button>
  </div>
  <div class="input-footer">
    <span class="hint">Enter para enviar • Shift+Enter para nova linha</span>
    <button id="clear-btn" onclick="clearChat()">🗑 Limpar chat</button>
  </div>
</div>

<div id="toast"></div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyEl    = document.getElementById('empty');
  const inputEl    = document.getElementById('user-input');
  const sendBtn    = document.getElementById('send-btn');
  const keyInput   = document.getElementById('api-key-input');
  const keyStatus  = document.getElementById('key-status');
  const modelSel   = document.getElementById('model-select');

  let history = [];
  let isStreaming = false;

  // ── Auto-resize textarea ──
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 180) + 'px';
  });

  // ── Key status indicator ──
  keyInput.addEventListener('input', () => {
    const ok = keyInput.value.trim().startsWith('sk-ant-');
    keyStatus.className = 'key-status' + (ok ? ' ok' : '');
    keyStatus.title = ok ? 'Chave válida' : 'Chave inválida';
    localStorage.setItem('apiKey', keyInput.value.trim());
  });

  // Restore saved key
  const saved = localStorage.getItem('apiKey');
  if (saved) {
    keyInput.value = saved;
    keyInput.dispatchEvent(new Event('input'));
  }

  // ── Keyboard shortcuts ──
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  sendBtn.addEventListener('click', sendMessage);

  // ── Suggestions ──
  window.suggest = text => {
    inputEl.value = text;
    inputEl.dispatchEvent(new Event('input'));
    sendMessage();
  };

  // ── Clear chat ──
  window.clearChat = () => {
    history = [];
    messagesEl.innerHTML = '';
    messagesEl.appendChild(emptyEl);
    emptyEl.style.display = 'flex';
  };

  // ── Toast ──
  function showToast(msg, isError = false) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = 'show' + (isError ? ' error' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => { t.className = ''; }, 3500);
  }

  // ── Create message bubble ──
  function appendBubble(role) {
    emptyEl.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '👤' : '✦';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return bubble;
  }

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Simple markdown-ish renderer ──
  function renderMarkdown(text) {
    return text
      .replace(/```([\s\S]*?)```/g, (_, code) =>
        `<pre><code>${escapeHtml(code.trim())}</code></pre>`)
      .replace(/`([^`]+)`/g, (_, code) =>
        `<code>${escapeHtml(code)}</code>`)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/\n/g, '<br>');
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Send message ──
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isStreaming) return;

    const key = keyInput.value.trim();
    if (!key) {
      showToast('⚠️ Insira sua API Key primeiro.', true);
      keyInput.focus();
      return;
    }

    isStreaming = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';

    history.push({ role: 'user', content: text });

    appendBubble('user').innerHTML = renderMarkdown(text);

    const aiBubble = appendBubble('assistant');
    const cursor = document.createElement('span');
    cursor.className = 'cursor';
    aiBubble.appendChild(cursor);

    let aiText = '';

    try {
      const resp = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': key,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true',
        },
        body: JSON.stringify({
          model: modelSel.value,
          max_tokens: 4096,
          stream: true,
          messages: history,
          system: 'Você é um assistente de IA poderoso, amigável e preciso. Responda sempre em português do Brasil, de forma clara e natural. Quando relevante, use formatação markdown (negrito, código etc.).',
        }),
      });

      if (!resp.ok) {
        const err = await resp.json().catch(() => ({}));
        const msg = err?.error?.message || `HTTP ${resp.status}`;
        throw new Error(msg);
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });

        const lines = buf.split('\n');
        buf = lines.pop();

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const data = line.slice(6).trim();
          if (data === '[DONE]') continue;
          try {
            const ev = JSON.parse(data);
            if (ev.type === 'content_block_delta' && ev.delta?.type === 'text_delta') {
              aiText += ev.delta.text;
              aiBubble.innerHTML = renderMarkdown(aiText);
              aiBubble.appendChild(cursor);
              scrollToBottom();
            }
          } catch {}
        }
      }

      aiBubble.innerHTML = renderMarkdown(aiText);
      history.push({ role: 'assistant', content: aiText });

    } catch (err) {
      aiBubble.innerHTML = `<span style="color:#fca5a5">⚠️ Erro: ${err.message}</span>`;
      history.pop(); // remove user msg on error
      showToast('Erro na requisição: ' + err.message, true);
    }

    scrollToBottom();
    isStreaming = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
